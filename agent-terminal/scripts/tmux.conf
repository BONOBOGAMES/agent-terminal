# Agent Terminal tmux configuration

# Use the inherited terminal type (better compatibility)
set-option -g default-terminal $TERM

# Start window and pane numbering at 1 (more intuitive)
set-option -g base-index 1
setw -g pane-base-index 1

# Status bar styling - Agent Terminal branded
set -g status-style "fg=colour252,bg=#1a1b26"
set -g status-interval 15

# Left side: add-on identity label
set -g status-left "#[fg=colour214,bold] Agent Terminal #[fg=colour245]| "
set -g status-left-length 25

# Right side: auth status, HA status, date/time (via status script)
set -g status-right-length 60
set -g status-right "#(/opt/scripts/tmux-status.sh)"

# Window status styling
set -g window-status-current-style "fg=colour214,bold"
set -g window-status-style "fg=colour245"

# Pane border styling
set -g pane-border-style "fg=colour236"
set -g pane-active-border-style "fg=colour214"

# Message styling
set -g message-style "fg=colour214,bg=#1a1b26"

# Ensure environment variables propagate to status script
set -g update-environment "SUPERVISOR_TOKEN XAI_API_KEY GROK_DEPLOYMENT_KEY XDG_CONFIG_HOME XDG_DATA_HOME HOME"

# Mouse support — the wheel scrolls tmux history (copy-mode), drag selects
# text and copies it to the browser clipboard via OSC 52 (see below).
# Without this, scrollback is unreachable in ttyd because tmux runs on the
# alternate screen (issues #55, #82).
set -g mouse on

# OSC 52 clipboard support - sends copied text to browser clipboard
set -g set-clipboard on
set -g allow-passthrough on

# ttyd advertises TERM=xterm-256color, whose terminfo lacks the Ms capability,
# so tmux would never actually emit OSC 52 (copies silently stayed in tmux's
# internal buffer — broke copying the OAuth login URL). Teach tmux the escape
# sequence explicitly so drag-copy and app-side copies (e.g. Grok's login
# "press c to copy") reach the browser clipboard.
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Increase scroll-back buffer significantly (default is 2000)
set -g history-limit 50000

# Faster escape time for better vim/nano responsiveness
set -sg escape-time 0

# vi-style keys in copy mode
setw -g mode-keys vi

# Advanced copy mode improvements for when mouse mode is enabled
# These work well even with ttyd's mouse handling

# Enter copy mode with mouse scroll (when mouse is enabled)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Copy on mouse drag end - copies to tmux buffer (OSC 52 handles clipboard)                                                                                                                                                                                                                                                                                                                                                                             
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Double-click word selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word

# Triple-click line selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line
