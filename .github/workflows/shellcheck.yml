name: ShellCheck

on:
  pull_request:
    paths:
      - "agent-terminal/**/*.sh"
      - ".github/workflows/shellcheck.yml"
  push:
    branches: [main]
    paths:
      - "agent-terminal/**/*.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on pure-bash scripts
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2086 -e SC2034
        with:
          scandir: "./agent-terminal/scripts"
          # run.sh / setup-ha-mcp / health-check / persist-install use bashio
          # (HA base image) and are covered by build-test smoke instead
          ignore_names: >-
            setup-ha-mcp.sh
            health-check.sh
            persist-install.sh
