name: ShellCheck

on:
  pull_request:
    paths:
      - "agent-terminal/**/*.sh"
      - ".github/workflows/shellcheck.yml"
  push:
    branches: [main]
    paths:
      - "agent-terminal/**/*.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Prefer distro shellcheck over ludeeus/action-shellcheck (Node 20 action).
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          set -euo pipefail
          # bashio scripts only run inside HA base images; skip them here
          skip='setup-ha-mcp.sh|health-check.sh|persist-install.sh'
          status=0
          for f in agent-terminal/scripts/*.sh; do
            base=$(basename "$f")
            if echo "$base" | grep -Eq "^($skip)$"; then
              echo "SKIP: $f (bashio)"
              continue
            fi
            echo "CHECK: $f"
            shellcheck -e SC1091 -e SC2086 -e SC2034 "$f" || status=1
          done
          exit $status
